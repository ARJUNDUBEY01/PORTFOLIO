<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallax Option A Preview</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://res.cloudinary.com/du7sy9rsf/image/upload/v1672323565/noise_qfuv7a.png');
            opacity: 0.05;
            pointer-events: none;
            z-index: 10;
        }

        /* Layer 1: Background Parallax */
        .bg-parallax {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        .blob {
            position: absolute;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, #6366f1 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.2;
        }

        .bg-text {
            position: absolute;
            font-size: 20vw;
            font-weight: 900;
            color: rgba(255,255,255,0.03);
            white-space: nowrap;
            top: 20%;
            left: 5%;
        }

        /* Layer 2: Main Content */
        .section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .hero-title {
            font-size: 10vw;
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            line-height: 0.8;
            z-index: 2;
        }

        /* Layer 3: Project Parallax (Image Shifting) */
        .project-container {
            display: flex;
            gap: 100px;
            padding: 100px;
            width: 200vw;
        }

        .project-card {
            width: 600px;
            height: 400px;
            background: #111;
            overflow: hidden;
            position: relative;
            border-radius: 20px;
        }

        .project-img {
            position: absolute;
            top: -20%;
            left: 0;
            width: 100%;
            height: 140%; /* Taller than container for shift */
            object-fit: cover;
            filter: brightness(0.7);
        }

        .scroll-hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            letter-spacing: 0.3em;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="bg-parallax">
        <div class="blob" id="blob1" style="top: 10%; left: -10%;"></div>
        <div class="blob" id="blob2" style="bottom: 10%; right: -10%; background: radial-gradient(circle, #a855f7 0%, transparent 70%);"></div>
        <div class="bg-text">ENGINEER</div>
    </div>

    <div class="section">
        <h1 class="hero-title">OPTION A<br><span style="color: #6366f1;">PREVIEW</span></h1>
    </div>

    <div class="section" id="projects-trigger" style="height: 300vh; background: #000;">
        <div style="position: sticky; top: 0; height: 100vh; display: flex; align-items: center; overflow: hidden;">
            <div class="project-container">
                <div class="project-card">
                    <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=800" class="project-img" alt="P1">
                    <h2 style="position: absolute; bottom: 30px; left: 30px; z-index: 5;">BLINDNAV AI</h2>
                </div>
                <div class="project-card">
                    <img src="https://images.unsplash.com/photo-1521737711867-e3b97375f902?w=800" class="project-img" alt="P2">
                    <h2 style="position: absolute; bottom: 30px; left: 30px; z-index: 5;">KAAMSETU</h2>
                </div>
                <div class="project-card">
                    <img src="https://images.unsplash.com/photo-1535320903710-d993d3d77d29?w=800" class="project-img" alt="P3">
                    <h2 style="position: absolute; bottom: 30px; left: 30px; z-index: 5;">AI TRADING</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="scroll-hint">SCROLL TO SEE DEPTH</div>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // 1. Background Text Parallax (Movement opposite to scroll)
        gsap.to(".bg-text", {
            y: -200,
            scrollTrigger: {
                trigger: "body",
                start: "top top",
                end: "bottom bottom",
                scrub: 1
            }
        });

        // 2. Blobs drifting based on mouse
        window.addEventListener('mousemove', (e) => {
            const { clientX, clientY } = e;
            gsap.to(".blob", {
                x: (clientX / window.innerWidth - 0.5) * 50,
                y: (clientY / window.innerHeight - 0.5) * 50,
                duration: 2,
                ease: "power2.out"
            });
        });

        // 3. Horizontal Scroll + Image Internal Shift
        const container = document.querySelector(".project-container");
        gsap.to(container, {
            x: () => -(container.scrollWidth - window.innerWidth),
            ease: "none",
            scrollTrigger: {
                trigger: "#projects-trigger",
                start: "top top",
                end: "bottom bottom",
                scrub: 1,
                pin: true
            }
        });

        // The "Image Shift" Parallax
        document.querySelectorAll(".project-img").forEach(img => {
            gsap.to(img, {
                y: "20%",
                ease: "none",
                scrollTrigger: {
                    trigger: img.parentElement,
                    start: "left right",
                    end: "right left",
                    scrub: true,
                    containerAnimation: gsap.to(container, { x: -(container.scrollWidth - window.innerWidth), ease: "none" }) // Important for horizontal
                }
            });
        });
    </script>
</body>
</html>
